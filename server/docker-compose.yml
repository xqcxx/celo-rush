services:
  postgres:
    image: postgres:16-alpine
    container_name: bullrush-pg
    environment:
      POSTGRES_USER: bullrush
      POSTGRES_PASSWORD: bullrush
      POSTGRES_DB: bullrush
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bullrush-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
